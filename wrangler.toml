name = "playerdle"
pages_build_output_dir = "apps/react/dist"
compatibility_date = "2024-01-15"

# Device sync storage.
# To enable sync:
#   1. Run: wrangler kv namespace create PLAYERDLE_SYNC_KV
#   2. Replace the id below with the output namespace ID
#   3. Deploy
[[kv_namespaces]]
binding = "PLAYERDLE_SYNC_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
