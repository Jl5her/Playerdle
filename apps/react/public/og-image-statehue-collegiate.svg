        font-size="148" font-weight="900" fill="#f2f6fb" opacity="0.9">S</text>
  <text x="600" y="402" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="60" font-weight="900" fill="#f2f6fb" letter-spacing="8">STATEHUE</text>
  <text x="600" y="464" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="36" font-weight="700" fill="#6b89b8" letter-spacing="6">COLLEGIATE</text>
  <text x="600" y="517" text-anchor="middle" dominant-baseline="central"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="500" fill="#6b89b8" letter-spacing="3">GUESS THE STATE BY COLLEGE TEAM COLORS</text>
