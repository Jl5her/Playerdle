  <script>
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, false);
    document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, false);
  </script>
  <script>
    (function () {
      var theme = localStorage.getItem('playerdle-theme') || 'system';
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (theme === 'dark' || (theme === 'system' && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
if (localStorage.getItem('playerdle-colorblind') === 'true') {
        document.documentElement.classList.add('high-contrast');
      }
    })();
  </script>
