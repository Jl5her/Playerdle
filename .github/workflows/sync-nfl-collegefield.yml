name: Sync NFL College Field Data

on:
  schedule:
    - cron: "0 8 * 9-12,1-2 *"
    - cron: "0 8 * 3-8 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    uses: ./.github/workflows/sync-league-data.yml
    with:
      league: nfl-collegefield
      scrape_command: pnpm run scrape:collegefield
      data_path: packages/data/src/collegecourt/nfl-college-field.json
